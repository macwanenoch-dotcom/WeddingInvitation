<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation | 9th Sept 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #002147; --ivory: #FFFFF0; --burgundy: #800020; --forest: #228B22; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Lato', sans-serif; background-color: var(--ivory); color: var(--navy); text-align: center; line-height: 1.6; }
        h1, h2 { font-family: 'Playfair Display', serif; }
        .hero { background: var(--navy); color: var(--ivory); padding: 80px 20px; border-bottom: 6px solid var(--forest); }
        .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .hidden { display: none !important; }
        .rsvp-section { background: var(--navy); color: var(--ivory); padding: 40px; border-radius: 15px; margin-top: 40px; }
        form { max-width: 400px; margin: 0 auto; text-align: left; display: flex; flex-direction: column; gap: 15px; }
        input { padding: 12px; border-radius: 5px; border: 1px solid #ccc; width: 100%; }
        .headcount-label { font-weight: bold; display: block; margin-bottom: 5px; }
        .btn-primary { background: var(--burgundy); color: white; border: none; padding: 15px; font-weight: bold; cursor: pointer; border-radius: 5px; text-transform: uppercase; }
    </style>
</head>
<body>

    <header class="hero">
        <h1 id="greeting">Welcome, Valued Guest</h1>
        <p>We request the honor of your presence</p>
    </header>

    <div class="container">
        <div id="lunch-section" class="card hidden">
            <h2 style="color: var(--burgundy)">Special Lunch</h2>
            <p>9th September 2026 | Sayaji Hotel</p>
        </div>

        <section class="rsvp-section">
            <h2>RSVP</h2>
            <form id="rsvpForm">
                <label>Name</label>
                <input type="text" id="formName" readonly>

                <label class="headcount-label" id="countLabel">Number of Guests</label>
                <input type="number" id="headcount" min="1" value="1" required>
                <small id="maxHint" style="color: #FFD700;"></small>

                <div id="lunch-rsvp" class="hidden">
                    <label><input type="checkbox" id="lunchCheck"> Attending Lunch</label>
                </div>

                <button type="submit" class="btn-primary">Submit Response</button>
            </form>
        </section>
    </div>

    <script>
        // Ideally, you'd fetch this from your 'guests.json' file
        // For now, I've embedded the data structure you need
        const guestList = {
            "Enoch": { name: "Enoch Macwan", lunch: true, maxHeadcount: 5 },
            "JohnDoe": { name: "John Doe", lunch: true, maxHeadcount: 3 },
            "JaneSmith": { name: "Jane Smith", lunch: false, maxHeadcount: 2 }
        };

        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const guestKey = params.get('name');

            if (guestKey && guestList[guestKey]) {
                const guest = guestList[guestKey];
                
                document.getElementById('greeting').innerText = `Welcome, ${guest.name}`;
                document.getElementById('formName').value = guest.name;

                // 1. Headcount Logic
                const countInput = document.getElementById('headcount');
                const hint = document.getElementById('maxHint');
                
                countInput.max = guest.maxHeadcount; // Sets the limit
                hint.innerText = `Note: Max ${guest.maxHeadcount} guests allowed for this invite.`;

                // 2. Lunch Visibility Logic
                if (guest.lunch) {
                    document.getElementById('lunch-section').classList.remove('hidden');
                    document.getElementById('lunch-rsvp').classList.remove('hidden');
                }
            }
        });

        document.getElementById('rsvpForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const count = document.getElementById('headcount').value;
            const max = document.getElementById('headcount').max;

            if (parseInt(count) > parseInt(max)) {
                alert(`Sorry, the maximum headcount for this invitation is ${max}.`);
            } else {
                alert("Thank you! Your RSVP for " + count + " people has been received.");
            }
        });
    </script>
</body>
</html>
